<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Conteúdo • Rafael</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="topbar">
    <div>
      <h1>Painel de Conteúdo</h1>
      <p>Monitor de extraídos, criados, postados, pendentes e roteiros de gravação</p>
    </div>
    <div class="pill" id="syncInfo">Sincronizando…</div>
  </header>

  <section class="cards" id="kpis"></section>

  <section class="panel">
    <div class="panel-head">
      <h2>Conteúdos</h2>
      <div class="filters">
        <select id="statusFilter">
          <option value="">Todos os status</option>
        </select>
        <input id="originFilter" type="text" placeholder="Filtrar por @origem" />
        <input id="searchFilter" type="text" placeholder="Buscar título/tema" />
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Título</th>
            <th>Status</th>
            <th>Origem</th>
            <th>Data</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="contentRows"></tbody>
      </table>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Roteiros de Gravação (novo_script)</h2>
      <select id="scriptStatusFilter">
        <option value="">Todos</option>
      </select>
    </div>
    <div id="scriptCards" class="script-grid"></div>
  </section>

  <script src="./app.js"></script>
</body>
</html>
