<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel Monitor — Rafael Batista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
    <div class="grid-lines"></div>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-mark">
        <span class="brand-icon">◈</span>
        <div>
          <h1 class="brand-title">Carousel Monitor</h1>
          <p class="brand-sub">Rafael Batista · Pipeline de Conteúdo</p>
        </div>
      </div>
    </div>
    <div class="topbar-status">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Conectando...</span>
      <button class="refresh-btn" id="refreshBtn" title="Atualizar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M12.5 7A5.5 5.5 0 1 1 7 1.5V3l3-3-3-3v1.5A7 7 0 1 0 14 7h-1.5z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Navigation tabs -->
  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="conteudos">
      <span class="tab-icon">⬡</span> Conteúdos
    </button>
    <button class="tab-btn" data-tab="roteiros">
      <span class="tab-icon">◎</span> Roteiros
    </button>
    <button class="tab-btn" data-tab="publicacoes">
      <span class="tab-icon">◉</span> Publicações
    </button>
  </nav>

  <main class="main">

    <!-- KPI Row -->
    <section class="kpi-row" id="kpiRow">
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
      <div class="kpi-skeleton"></div>
    </section>

    <!-- TAB: Conteúdos -->
    <section class="tab-panel active" id="tab-conteudos">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title-group">
            <h2 class="panel-title">Conteúdos Extraídos</h2>
            <span class="record-count" id="contentCount">—</span>
          </div>
          <div class="filter-bar">
            <div class="filter-group">
              <label class="filter-label">Status</label>
              <select class="filter-input" id="filterStatus">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Plataforma</label>
              <select class="filter-input" id="filterPlataforma">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Conta</label>
              <select class="filter-input" id="filterArroba">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Score mín.</label>
              <input class="filter-input" type="number" id="filterScore" placeholder="0" min="0" max="100" style="width:80px">
            </div>
            <div class="filter-group search-group">
              <label class="filter-label">Buscar</label>
              <div class="search-wrap">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input class="filter-input search-input" type="text" id="filterSearch" placeholder="Título, tema, @conta...">
              </div>
            </div>
            <button class="clear-btn" id="clearFilters">Limpar</button>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table" id="contentTable">
            <thead>
              <tr>
                <th class="col-thumb"></th>
                <th class="sortable" data-col="titulo">Título <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-col="status">Status <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-col="arroba_referencia">Conta <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-col="engagement_score">Score <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-col="plataforma">Plataforma <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-col="template_usado">Template <span class="sort-arrow">↕</span></th>
                <th class="sortable" data-col="data_extracao">Extraído <span class="sort-arrow">↕</span></th>
                <th>Links</th>
              </tr>
            </thead>
            <tbody id="contentBody">
              <tr class="loading-row"><td colspan="9"><div class="spinner"></div> Carregando...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination" id="contentPagination"></div>
      </div>
    </section>

    <!-- TAB: Roteiros -->
    <section class="tab-panel" id="tab-roteiros">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title-group">
            <h2 class="panel-title">Roteiros de Atendimento</h2>
            <span class="record-count" id="roteiroCount">—</span>
          </div>
          <div class="filter-bar">
            <div class="filter-group">
              <label class="filter-label">Status</label>
              <select class="filter-input" id="filterRoteiroStatus">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="filter-group search-group">
              <label class="filter-label">Buscar</label>
              <div class="search-wrap">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input class="filter-input search-input" type="text" id="filterRoteiroSearch" placeholder="Título, @conta...">
              </div>
            </div>
          </div>
        </div>

        <div class="roteiro-grid" id="roteiroGrid">
          <div class="loading-card"><div class="spinner"></div> Carregando roteiros...</div>
        </div>
      </div>
    </section>

    <!-- TAB: Publicações -->
    <section class="tab-panel" id="tab-publicacoes">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title-group">
            <h2 class="panel-title">Status de Publicações</h2>
            <span class="record-count" id="pubCount">—</span>
          </div>
          <div class="filter-bar">
            <div class="filter-group">
              <label class="filter-label">Plataforma</label>
              <select class="filter-input" id="filterPubPlatform">
                <option value="">Todas</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="linkedin">LinkedIn</option>
              </select>
            </div>
          </div>
        </div>

        <div class="pub-grid" id="pubGrid">
          <div class="loading-card"><div class="spinner"></div> Carregando publicações...</div>
        </div>
      </div>
    </section>

  </main>

  <!-- Detail modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">×</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
